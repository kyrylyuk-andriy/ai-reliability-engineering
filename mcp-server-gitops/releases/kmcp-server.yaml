apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-health-checker
  namespace: kagent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-health-checker
rules:
  - apiGroups: [""]
    resources: [pods, nodes, events]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-health-checker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-health-checker
subjects:
  - kind: ServiceAccount
    name: k8s-health-checker
    namespace: kagent
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: k8s-health-checker
  namespace: kagent
spec:
  deployment:
    image: ghcr.io/kyrylyuk-andriy/k8s-health-checker:latest
    cmd: /k8s-health-checker
    serviceAccountName: k8s-health-checker
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  transportType: stdio
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: k8s-health-agent
  namespace: kagent
spec:
  description: "Kubernetes cluster health checker agent. Can inspect pods, nodes, deployments, and warning events."
  type: Declarative
  declarative:
    modelConfig: default-model-config
    systemMessage: |
      You are a Kubernetes health check assistant. Use the available tools to inspect
      cluster health when asked. Provide clear, concise summaries of the cluster state
      and highlight any issues that need attention.
    tools:
      - type: McpServer
        mcpServer:
          name: k8s-health-checker
          kind: MCPServer
          apiGroup: kagent.dev
          toolNames:
            - get_pod_status
            - get_node_status
            - get_deployment_status
            - get_events
